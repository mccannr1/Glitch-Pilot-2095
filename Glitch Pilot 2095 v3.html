// ═══════════════════════════════════════════════════════════════════════
// AUDIO
// ═══════════════════════════════════════════════════════════════════════
let AC=null;
const getAC=()=>{if(!AC)AC=new(window.AudioContext||window.webkitAudioContext)();return AC;};

function playBlaster(vol){
  vol=vol||1;
  const ac=getAC(),n=ac.currentTime;
  const o1=ac.createOscillator(),g1=ac.createGain();
  o1.type='square';
  o1.frequency.setValueAtTime(1400,n);
  o1.frequency.exponentialRampToValueAtTime(280,n+.06);
  o1.frequency.exponentialRampToValueAtTime(90,n+.13);
  g1.gain.setValueAtTime(.0001,n);
  g1.gain.linearRampToValueAtTime(.32*vol,n+.008);
  g1.gain.exponentialRampToValueAtTime(.001,n+.14);
  o1.connect(g1);g1.connect(ac.destination);
  o1.start(n);o1.stop(n+.15);
  const o2=ac.createOscillator(),g2=ac.createGain(),dist=ac.createWaveShaper();
  const cv=new Float32Array(512);for(let i=0;i<512;i++){const x=i/256-1;cv[i]=x<0?-Math.pow(-x,.4):Math.pow(x,.4);}
  dist.curve=cv;
  o2.type='sawtooth';
  o2.frequency.setValueAtTime(3200,n);
  o2.frequency.exponentialRampToValueAtTime(180,n+.11);
  g2.gain.setValueAtTime(.18*vol,n);
  g2.gain.exponentialRampToValueAtTime(.001,n+.12);
  o2.connect(dist);dist.connect(g2);g2.connect(ac.destination);
  o2.start(n);o2.stop(n+.13);
  const o3=ac.createOscillator(),g3=ac.createGain();
  o3.type='sine';
  o3.frequency.setValueAtTime(180,n);
  o3.frequency.exponentialRampToValueAtTime(55,n+.08);
  g3.gain.setValueAtTime(.22*vol,n);
  g3.gain.exponentialRampToValueAtTime(.001,n+.09);
  o3.connect(g3);g3.connect(ac.destination);
  o3.start(n);o3.stop(n+.1);
}

function playExplosion(big){const ac=getAC(),n=ac.currentTime,buf=ac.createBuffer(1,ac.sampleRate*(big?.7:.35),ac.sampleRate),d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=Math.random()*2-1;const s=ac.createBufferSource(),g=ac.createGain(),f=ac.createBiquadFilter();f.type='lowpass';f.frequency.setValueAtTime(big?600:900,n);f.frequency.exponentialRampToValueAtTime(60,n+(big?.7:.35));g.gain.setValueAtTime(big?.9:.55,n);g.gain.exponentialRampToValueAtTime(.001,n+(big?.65:.3));s.buffer=buf;s.connect(f);f.connect(g);g.connect(ac.destination);s.start(n);}

function playPlayerExplode(){
  const ac=getAC(),n=ac.currentTime;
  // Layer 1: deep booming low-end — filtered noise with slow decay
  const len=ac.sampleRate*1.6;
  const buf=ac.createBuffer(1,len,ac.sampleRate);
  const d=buf.getChannelData(0);
  for(let i=0;i<len;i++)d[i]=Math.random()*2-1;
  const src=ac.createBufferSource(),lp=ac.createBiquadFilter(),hp=ac.createBiquadFilter(),g1=ac.createGain();
  lp.type='lowpass';lp.frequency.setValueAtTime(900,n);lp.frequency.exponentialRampToValueAtTime(55,n+1.4);
  hp.type='highpass';hp.frequency.value=30;
  g1.gain.setValueAtTime(1.1,n);
  g1.gain.setValueAtTime(1.1,n+.02);
  g1.gain.exponentialRampToValueAtTime(.001,n+1.5);
  src.buffer=buf;src.connect(lp);lp.connect(hp);hp.connect(g1);g1.connect(ac.destination);src.start(n);
  // Layer 2: sub-bass punch — fast sine bloom then decay
  const o1=ac.createOscillator(),go1=ac.createGain();
  o1.type='sine';
  o1.frequency.setValueAtTime(95,n);o1.frequency.exponentialRampToValueAtTime(28,n+.35);
  go1.gain.setValueAtTime(.0001,n);go1.gain.linearRampToValueAtTime(.9,n+.015);go1.gain.exponentialRampToValueAtTime(.001,n+.5);
  o1.connect(go1);go1.connect(ac.destination);o1.start(n);o1.stop(n+.55);
  // Layer 3: mid crackle — bandpass noise burst for body
  const buf2=ac.createBuffer(1,ac.sampleRate*.4,ac.sampleRate);
  const d2=buf2.getChannelData(0);for(let i=0;i<d2.length;i++)d2[i]=Math.random()*2-1;
  const src2=ac.createBufferSource(),bp=ac.createBiquadFilter(),g2=ac.createGain();
  bp.type='bandpass';bp.frequency.setValueAtTime(600,n);bp.frequency.exponentialRampToValueAtTime(200,n+.4);bp.Q.value=1.2;
  g2.gain.setValueAtTime(.65,n);g2.gain.exponentialRampToValueAtTime(.001,n+.38);
  src2.buffer=buf2;src2.connect(bp);bp.connect(g2);g2.connect(ac.destination);src2.start(n);
  // Layer 4: high snap transient — gives it an initial crack
  const buf3=ac.createBuffer(1,ac.sampleRate*.04,ac.sampleRate);
  const d3=buf3.getChannelData(0);for(let i=0;i<d3.length;i++)d3[i]=Math.random()*2-1;
  const src3=ac.createBufferSource(),g3=ac.createGain();
  g3.gain.setValueAtTime(.55,n);g3.gain.exponentialRampToValueAtTime(.001,n+.04);
  src3.buffer=buf3;src3.connect(g3);g3.connect(ac.destination);src3.start(n);
}

function playPlayerReform(){const ac=getAC(),n=ac.currentTime,buf=ac.createBuffer(1,ac.sampleRate*.65,ac.sampleRate),d=buf.getChannelData(0);for(let i=0;i<d.length;i++){const t=i/d.length;d[i]=(Math.random()*2-1)*(1-t)*Math.sin(t*180)*.7;}const s=ac.createBufferSource(),g=ac.createGain(),f=ac.createBiquadFilter();f.type='bandpass';f.frequency.setValueAtTime(200,n);f.frequency.exponentialRampToValueAtTime(2200,n+.6);g.gain.setValueAtTime(.001,n);g.gain.linearRampToValueAtTime(.6,n+.15);g.gain.exponentialRampToValueAtTime(.001,n+.65);s.buffer=buf;s.connect(f);f.connect(g);g.connect(ac.destination);s.start(n);const o=ac.createOscillator(),og=ac.createGain();o.type='sine';o.frequency.setValueAtTime(1200,n+.55);o.frequency.exponentialRampToValueAtTime(2400,n+.85);og.gain.setValueAtTime(.001,n+.5);og.gain.linearRampToValueAtTime(.3,n+.6);og.gain.exponentialRampToValueAtTime(.001,n+.9);o.connect(og);og.connect(ac.destination);o.start(n+.5);o.stop(n+.92);}
function playWhoosh(){const ac=getAC(),n=ac.currentTime,o=ac.createOscillator(),g=ac.createGain(),f=ac.createBiquadFilter();f.type='bandpass';f.frequency.setValueAtTime(800,n);f.frequency.exponentialRampToValueAtTime(3200,n+.18);o.type='sawtooth';o.frequency.setValueAtTime(60,n);o.frequency.exponentialRampToValueAtTime(240,n+.18);g.gain.setValueAtTime(.35,n);g.gain.exponentialRampToValueAtTime(.001,n+.22);o.connect(f);f.connect(g);g.connect(ac.destination);o.start(n);o.stop(n+.24);}
function playHyperOut(){const ac=getAC(),n=ac.currentTime,o=ac.createOscillator(),o2=ac.createOscillator(),g=ac.createGain();o.type='sawtooth';o.frequency.setValueAtTime(80,n);o.frequency.exponentialRampToValueAtTime(4000,n+1.1);o2.type='square';o2.frequency.setValueAtTime(60,n);o2.frequency.exponentialRampToValueAtTime(3200,n+1.1);g.gain.setValueAtTime(.001,n);g.gain.linearRampToValueAtTime(.4,n+.15);g.gain.exponentialRampToValueAtTime(.001,n+1.1);o.connect(g);o2.connect(g);g.connect(ac.destination);o.start(n);o.stop(n+1.15);o2.start(n);o2.stop(n+1.15);}
function playHyperIn(){const ac=getAC(),n=ac.currentTime,o=ac.createOscillator(),g=ac.createGain();o.type='sawtooth';o.frequency.setValueAtTime(3500,n);o.frequency.exponentialRampToValueAtTime(90,n+.9);g.gain.setValueAtTime(.001,n);g.gain.linearRampToValueAtTime(.35,n+.1);g.gain.exponentialRampToValueAtTime(.001,n+.9);o.connect(g);g.connect(ac.destination);o.start(n);o.stop(n+.95);const buf=ac.createBuffer(1,ac.sampleRate*.25,ac.sampleRate),d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*(1-i/d.length);const s=ac.createBufferSource(),g2=ac.createGain(),f=ac.createBiquadFilter();f.type='lowpass';f.frequency.value=300;g2.gain.setValueAtTime(.7,n+.85);g2.gain.exponentialRampToValueAtTime(.001,n+1.1);s.buffer=buf;s.connect(f);f.connect(g2);g2.connect(ac.destination);s.start(n+.85);}

let thrusterNode=null,thrusterGain=null,thrusterOsc=null,thrusterNoise=null;
function startThruster(){
  if(thrusterNode)return;
  const ac=getAC();
  thrusterGain=ac.createGain();thrusterGain.gain.value=0;
  // Noise source — the air/whoosh layer
  const bufLen=ac.sampleRate*3;
  const buf=ac.createBuffer(1,bufLen,ac.sampleRate);
  const bd=buf.getChannelData(0);
  for(let i=0;i<bufLen;i++)bd[i]=Math.random()*2-1;
  thrusterNoise=ac.createBufferSource();thrusterNoise.buffer=buf;thrusterNoise.loop=true;
  // High-pass to keep it airy, not rumbling
  const hp=ac.createBiquadFilter();hp.type='highpass';hp.frequency.value=900;
  // Narrow bandpass to give it a breathy, focused character
  const bp=ac.createBiquadFilter();bp.type='bandpass';bp.frequency.value=1800;bp.Q.value=1.4;
  const nGain=ac.createGain();nGain.gain.value=0.9;
  thrusterNoise.connect(nGain);nGain.connect(hp);hp.connect(bp);bp.connect(thrusterGain);
  // Very soft tonal undertone — barely audible, just adds a little presence
  thrusterOsc=ac.createOscillator();thrusterOsc.type='sine';thrusterOsc.frequency.value=220;
  const oGain=ac.createGain();oGain.gain.value=0.06;
  thrusterOsc.connect(oGain);oGain.connect(thrusterGain);
  thrusterGain.connect(ac.destination);
  thrusterOsc.start();thrusterNoise.start();
  thrusterNode=thrusterNoise;
}
function setThruster(vol,pitch){
  if(!thrusterGain)startThruster();
  const ac=getAC(),n=ac.currentTime;
  thrusterGain.gain.setTargetAtTime(vol*.07,n,.12); // much quieter overall
  thrusterOsc.frequency.setTargetAtTime(pitch*.8,n,.2);
}

function playEnemyShot(laser){const ac=getAC(),n=ac.currentTime,o=ac.createOscillator(),g=ac.createGain();if(laser){o.type='square';o.frequency.setValueAtTime(1800,n);o.frequency.exponentialRampToValueAtTime(400,n+.1);g.gain.setValueAtTime(.15,n);g.gain.exponentialRampToValueAtTime(.001,n+.12);o.connect(g);g.connect(ac.destination);o.start(n);o.stop(n+.13);}else{o.type='sine';o.frequency.setValueAtTime(320,n);o.frequency.exponentialRampToValueAtTime(80,n+.22);g.gain.setValueAtTime(.12,n);g.gain.exponentialRampToValueAtTime(.001,n+.25);o.connect(g);g.connect(ac.destination);o.start(n);o.stop(n+.27);}}
function playScoreRing(n2){
  // Rising chime — pitch scales with note index for a "ringing up" feel
  const ac=getAC(),n=ac.currentTime;
  const freqs=[523,659,784,1047,1319,1568,2093];
  const f=freqs[Math.min(n2,freqs.length-1)];
  const o=ac.createOscillator(),g=ac.createGain(),o2=ac.createOscillator(),g2=ac.createGain();
  o.type='sine';o.frequency.value=f;
  g.gain.setValueAtTime(.0001,n);g.gain.linearRampToValueAtTime(.22,n+.01);g.gain.exponentialRampToValueAtTime(.001,n+.38);
  o2.type='sine';o2.frequency.value=f*2;
  g2.gain.setValueAtTime(.0001,n);g2.gain.linearRampToValueAtTime(.08,n+.01);g2.gain.exponentialRampToValueAtTime(.001,n+.22);
  o.connect(g);g.connect(ac.destination);o2.connect(g2);g2.connect(ac.destination);
  o.start(n);o.stop(n+.4);o2.start(n);o2.stop(n+.24);
}

// CONSTANTS
// ═══════════════════════════════════════════════════════════════════════
const ST={TITLE:0,PLAY:1,BOSS:2,CLEAR:3,DEAD:4,DYING:5,HYPERIN:6,HYPEROUT:7,BOSSTRANS:8,TUTORIAL:9,LEVEL_INTRO:10,BOSS_DEAD:11};
const ET={FODDER:0,MID:1,UPPER:2,BOSS:3};
const PU={AUTO:'A',TRI:'T',SECOND:'S',LASER:'L'};
const PU_COL={A:'#ff8800',T:'#00ffee',S:'#ff44ff',L:'#ffff44'};
const PU_NAME={A:'AUTOFIRE',T:'TRI-SHOT',S:'SECOND SHOT',L:'LASER BLAST'};
const PU_SPEED=13; // faster than boost (7.2)
const TUT={MOVE:0,SHOOT:1,BOOST:2,REV1:3,POST_REV:4,REV2:5,SAUCER:6,FIGHTER:7,FRIGATE:8,PWRUP:9,DONE:10};
const ECFG=[
  {hp:1,w:44,h:22,col:'#00ffee',en:5.5,fireRate:320},
  {hp:2,w:52,h:34,col:'#ffaa00',en:6.8,fireRate:200},
  {hp:4,w:51,h:35,col:'#ff44aa',en:11.5,fireRate:130},
  {hp:0,w:126,h:58,col:'#bb44ff',en:0,fireRate:80},
];
const MAX_EN=100,FIRE_CD=7,BASE_SCROLL=3.6,BOOST_SCROLL=7.2,MM_H=22,MM_Y=4,EN_H=11,BOSS_SPD=1.0;
const WL=-2916,WR=2916,FLIP_HINT_DIST=420,SAFE_SPAWN=1.6;
const BOOST_THRESH=44,DRIFT_AWAY_SPD=0.80,DRIFT_TOWARD_SPD=0.62;

const enY=()=>MM_Y+MM_H+6;

function initStars(){
  stars=Array.from({length:190},()=>({ox:Math.random()*W,y:Math.random()*H,par:.18+Math.random()*.82,sz:.3+Math.random()*2.0}));
}
function drawStars(sm){
  sm=sm||1;
  for(const s of stars){const sx=((s.ox-camX*s.par*.004*W*sm)%W+W*400)%W;ctx.fillStyle=`rgba(255,255,255,${.14+s.sz*.1})`;ctx.fillRect(sx,s.y,s.sz,s.sz);}
}

// ═══════════════════════════════════════════════════════════════════════
// LEVEL GENERATOR
// ═══════════════════════════════════════════════════════════════════════
function generateLevel(lv){
  const out=[],groups=[];let totalEn=0;
  const target=MAX_EN*1.22,minWX=Math.max(SAFE_SPAWN*W,W+100);
  if(lv===1)groups.push({type:ET.MID,n:1,side:1,fixed:true});
  if(lv>=2)groups.push({type:ET.UPPER,n:1,side:lv%2===0?1:-1,fixed:true});
  if(lv>=3)groups.push({type:ET.UPPER,n:1,side:lv%2===0?-1:1,fixed:true});
  let att=0;
  while(totalEn<target&&att<150){
    att++;
    const upP=lv>=2?Math.min(.3,lv*.06):0,midP=Math.min(.38,.15+lv*.04),r=Math.random();
    let type,maxN;
    if(r<upP){type=ET.UPPER;maxN=Math.min(3,1+Math.floor(lv/3));}
    else if(r<upP+midP){type=ET.MID;maxN=Math.min(3,1+Math.floor(lv/2));}
    else{type=ET.FODDER;maxN=Math.min(4,2+Math.floor(lv/2));}
    const n=1+Math.floor(Math.random()*maxN);
    groups.push({type,n,side:null,fixed:false});totalEn+=ECFG[type].en*n;
  }
  const unfixed=groups.filter(g=>!g.fixed),lB=[],rB=[];
  unfixed.forEach((g,i)=>i%2===0?rB.push(g):lB.push(g));
  while(lB.length<2&&rB.length>2)lB.push(rB.pop());
  while(rB.length<2&&lB.length>2)rB.push(lB.pop());
  const place=(g,side,idx,total)=>{
    const cfg=ECFG[g.type];
    // Left enemies spawn close (0.45–0.9 screens away), right enemies further (minWX out)
    let wx;
    if(side===-1){
      // Left enemies: closest starts ~0.5 screens away, spread out from there
      const lMin=W*.5,lMax=Math.abs(WL)*0.88,span=lMax-lMin;
      wx=-(lMin+(total>1?idx/(total-1):.5)*span+(Math.random()-.5)*160);
    } else {
      const span=Math.abs(WR)-minWX-200;
      wx=minWX+(total>1?idx/(total-1):.5)*span+(Math.random()-.5)*160;
    }
    const baseY=H*.18+Math.random()*H*.62;
    const tT=g.type===ET.BOSS?[0,45,90,135,180].map(o=>o+Math.floor(Math.random()*30)):null;
    for(let k=0;k<g.n;k++)out.push({type:g.type,hp:cfg.hp,maxHp:cfg.hp,wx:wx+(k-(g.n-1)/2)*(cfg.w+18),y:baseY+(k-(g.n-1)/2)*46,w:cfg.w,h:cfg.h,col:cfg.col,phase:Math.random()*Math.PI*2,flash:0,facing:-1,fireTimer:0,turretTimers:tT});
  };
  groups.filter(g=>g.fixed).forEach((g,i)=>place(g,g.side,i,4));
  lB.forEach((g,i)=>place(g,-1,i,lB.length));
  rB.forEach((g,i)=>place(g,1,i,rB.length));
  return out;
}

function newGame(keepStars){
  level=1;score=0;energy=0;frame=0;bossActive=false;clearTimer=0;screenFlash=0;
  ship={sx:W*.15,targetSx:W*.15,y:H/2,dir:1,hp:3,inv:0,lf:0,w:70,h:32};
  camX=0-W*.15;isBoosting=false;scrollSpd=BASE_SCROLL;
  bullets=[];enemyBullets=[];particles=[];deathAnim=null;hyperAnim=null;bossTrans=null;flipAnim=null;
  powerups=[];puSpawnTimer=180;laserHolding=false;laserDmgTimer=0;orbAngle=0;
  ship.pu=null;ship.puGlow=0;ship.puText=null;
  tutD=null;showedTutorial=false;levelIntroTimer=0;
  enemies=generateLevel(1);
  if(!keepStars)initStars();
  st=ST.TITLE;
}

function startPlay(){
  if(wantTutorial){initTutorial();}
  else{loadLevel1();}
}

function loadLevel1(){
  bullets=[];enemyBullets=[];particles=[];bossActive=false;energy=0;
  enemies=generateLevel(1);level=1;
  camX=0-W*.15;ship.y=H/2;ship.dir=1;ship.targetSx=W*.15;ship.sx=W*.15;
  beginHyperIn(()=>{
    if(showedTutorial){st=ST.LEVEL_INTRO;levelIntroTimer=300;}
    else st=ST.PLAY;
  });
}

function nextLevel(){
  level++;energy=0;bossActive=false;clearTimer=0;screenFlash=0;
  bullets=[];enemyBullets=[];particles=[];enemies=[];deathAnim=null;bossTrans=null;
  enemies=generateLevel(level);
  camX=0-W*.15;ship.y=H/2;ship.dir=1;ship.targetSx=W*.15;ship.sx=W*.15;
  beginHyperIn(()=>st=ST.PLAY);
}

function endTutorial(){
  showedTutorial=true;tutD=null;
  bullets=[];enemyBullets=[];particles=[];enemies=[];
  loadLevel1();
}

// TUTORIAL
// ═══════════════════════════════════════════════════════════════════════
function initTutorial(){
  tutD={step:TUT.MOVE,shots:0,boostFrames:0,hasMoved:false,postRevMoved:false,postRevShots:0,doneTimer:0,enemy:null,waitFrames:0,killedPause:0};
  bullets=[];enemyBullets=[];particles=[];enemies=[];energy=0;bossActive=false;
  camX=0-W*.15;ship.y=H/2;ship.dir=1;ship.targetSx=W*.15;ship.sx=W*.15;

function advTut(){
  tutD.step++;tutD.waitFrames=0;tutD.killedPause=0;
  if(tutD.step===TUT.SAUCER)spawnTutEnemy(ET.FODDER);
  if(tutD.step===TUT.FIGHTER)spawnTutEnemy(ET.MID);
  if(tutD.step===TUT.FRIGATE)spawnTutEnemy(ET.UPPER);
  if(tutD.step===TUT.PWRUP){
    // Spawn a demo crate ahead of player, matched to player speed (tethered)
    const types=Object.values(PU);
    const type=types[Math.floor(Math.random()*types.length)];
    const crate={type,wx:shipWX()+ship.dir*W*.5,y:ship.y,vx:0,w:36,h:36,tutDemo:true,noPickup:true};
    tutD.pwrupCrate=crate;tutD.pwrupTimer=0;
    powerups.push(crate);
  }
}

function spawnTutEnemy(type){

  const e={type,hp:cfg.hp,maxHp:cfg.hp,wx:shipWX()+ship.dir*(W*.85+cfg.w),y:H/2,w:cfg.w,h:cfg.h,col:cfg.col,phase:0,flash:0,facing:-1,fireTimer:9999,turretTimers:null,

function updTutorial(){
  if(!tutD)return;
  // Handle post-kill energy message pause
  if(tutD.killedPause>0){tutD.killedPause--;if(tutD.killedPause===0)advTut();return;}
  const step=tutD.step;
  if(step===TUT.MOVE){
    if(!tutD.hasMoved&&Math.abs(ship.y-H/2)>40){tutD.hasMoved=true;}
    if(tutD.hasMoved){tutD.waitFrames++;if(tutD.waitFrames>25)advTut();}
  } else if(step===TUT.BOOST){
    if(isBoosting)tutD.boostFrames++;
    if(tutD.boostFrames>=55)advTut();
  } else if(step===TUT.POST_REV){
    if(moveTouchY!==null)tutD.postRevMoved=true;
    if(tutD.postRevMoved&&tutD.postRevShots>=1)advTut();
  } else if(step===TUT.PWRUP){
    tutD.pwrupTimer=(tutD.pwrupTimer||0)+1;
    if(tutD.pwrupCrate){
      // After 5s show, send crate flying away
      if(tutD.pwrupTimer>=300){
        tutD.pwrupCrate.vx=-ship.dir*PU_SPEED*2;
        tutD.pwrupCrate.noPickup=true;
      }
      if(tutD.pwrupTimer>=360)advTut();
    }
  } else if(step===TUT.DONE){
    tutD.doneTimer++;
    if(tutD.doneTimer===1)setThruster(0,55);
    if(tutD.doneTimer>=180)beginHyperOut(endTutorial);
  }
}

function drawArrows(x,y,color){
  ctx.fillStyle=color;ctx.shadowBlur=12;ctx.shadowColor=color;
  // up arrow
  ctx.beginPath();ctx.moveTo(x,y-18);ctx.lineTo(x-9,y-5);ctx.lineTo(x+9,y-5);ctx.closePath();ctx.fill();
  // down arrow
  ctx.beginPath();ctx.moveTo(x,y+18);ctx.lineTo(x-9,y+5);ctx.lineTo(x+9,y+5);ctx.closePath();ctx.fill();
  ctx.shadowBlur=0;
}

function beginHyperIn(cb){

function beginHyperOut(doneCb){

  const beams=Array.from({length:22},()=>({angle:Math.random()*Math.PI*2,len:W*.12,spd:.7+Math.random()*.8,col:['#00eeff','#aa44ff','#ffffff','#4488ff'][Math.floor(Math.random()*4)]}));

function updHyper(){
  if(!hyperAnim)return;
  const ha=hyperAnim;ha.timer++;const t=ha.timer/ha.maxTimer;
  if(ha.type==='in'){
    ship.sx=ha.shipStartX+(ha.shipTargetX-ha.shipStartX)*easeOut(t);
    for(const b of ha.beams)b.len=Math.max(0,Math.sin(t*Math.PI)*W*.5*b.spd);
    if(ha.timer>=ha.maxTimer){ship.sx=ha.shipTargetX;hyperAnim=null;if(ha.cb)ha.cb();}
  } else {
    ship.sx=W*.15+easeIn(t)*W*1.8;
    for(const b of ha.beams)b.len=easeIn(t)*W*.65*b.spd;
    energy=MAX_EN*(1-t);
    if(ha.timer>=ha.maxTimer){hyperAnim=null;if(ha.doneCb)ha.doneCb();else nextLevel();}
  }
}
function drawHyperBeams(sx,sy){

  for(const b of hyperAnim.beams){const td=ship.dir===1?-1:1,bx=Math.cos(b.angle+Math.PI)*b.len*.25,by=Math.sin(b.angle)*b.len*.25;ctx.strokeStyle=b.col+'cc';ctx.shadowColor=b.col;ctx.shadowBlur=12;ctx.lineWidth=1.2+b.spd*.9;ctx.beginPath();ctx.moveTo(td*4,0);ctx.lineTo(td*b.len*1.1+bx*.4,by);ctx.stroke();}

// ─── Powerup sounds ───────────────────────────────────────────────────
function playTriShot(){
  // Blaster + slight echo
  playBlaster();
  const ac=getAC(),n=ac.currentTime,o=ac.createOscillator(),g=ac.createGain();
  o.type='sawtooth';o.frequency.setValueAtTime(2200,n+.04);o.frequency.exponentialRampToValueAtTime(120,n+.16);
  g.gain.setValueAtTime(.11,n+.04);g.gain.exponentialRampToValueAtTime(.001,n+.17);
  o.connect(g);g.connect(ac.destination);o.start(n+.04);o.stop(n+.18);
}
function playSecondShot(){
  playBlaster();
  const ac=getAC(),n=ac.currentTime,o=ac.createOscillator(),g=ac.createGain();
  o.type='square';o.frequency.setValueAtTime(4400,n+.02);o.frequency.exponentialRampToValueAtTime(1200,n+.1);
  g.gain.setValueAtTime(.09,n+.02);g.gain.exponentialRampToValueAtTime(.001,n+.11);
  o.connect(g);g.connect(ac.destination);o.start(n+.02);o.stop(n+.12);
}
let laserSrcNode=null,laserGainNode=null;
function startLaserSound(){
  if(laserSrcNode)return;
  const ac=getAC();
  const buf=ac.createBuffer(1,ac.sampleRate*2,ac.sampleRate),d=buf.getChannelData(0);
  for(let i=0;i<d.length;i++)d[i]=Math.random()*2-1;
  const src=ac.createBufferSource();src.buffer=buf;src.loop=true;
  const bp=ac.createBiquadFilter();bp.type='bandpass';bp.frequency.value=1800;bp.Q.value=3;
  const bp2=ac.createBiquadFilter();bp2.type='bandpass';bp2.frequency.value=3600;bp2.Q.value=4;
  laserGainNode=ac.createGain();laserGainNode.gain.value=.18;
  src.connect(bp);bp.connect(laserGainNode);src.connect(bp2);bp2.connect(laserGainNode);
  laserGainNode.connect(ac.destination);src.start();laserSrcNode=src;
}
function stopLaserSound(){
  if(!laserSrcNode)return;
  try{laserSrcNode.stop();laserGainNode.disconnect();}catch(e){}
  laserSrcNode=null;laserGainNode=null;
}

// ─── Powerup crate spawning / logic ───────────────────────────────────
function spawnPowerup(){
  const types=Object.values(PU);
  const type=types[Math.floor(Math.random()*types.length)];
  // Always spawn ahead of the player (in direction of travel), moving toward them
  const vx=-ship.dir*PU_SPEED; // moves opposite to player direction so it approaches
  const wx=ship.dir===1?camX+W*1.3:camX-W*.3; // spawn off the leading edge
  powerups.push({type,wx,y:H*.15+Math.random()*H*.65,vx,w:36,h:36});
}
function updPowerups(){
  // During tutorial, only update the demo crate if one exists
  if(st===ST.TUTORIAL){
    const swx=shipWX();
    for(let i=powerups.length-1;i>=0;i--){
      const p=powerups[i];
      if(p.tutDemo){
        // Tether to player until zoom-away starts
        if(!p.noPickup||tutD?.pwrupTimer<300){
          p.wx=swx+ship.dir*W*.5;p.y=ship.y;
        } else {
          p.wx+=p.vx; // zooming away
        }
        if(wts(p.wx)<-W*2||wts(p.wx)>W*3)powerups.splice(i,1);
      }
    }
    return;
  }
  if(st===ST.TITLE)return;
  if(--puSpawnTimer<=0){
    spawnPowerup();
    puSpawnTimer=280+Math.floor(Math.random()*240);
  }
  const swx=shipWX();
  for(let i=powerups.length-1;i>=0;i--){
    const p=powerups[i];p.wx+=p.vx;
    if(wts(p.wx)<-W*1.5||wts(p.wx)>W*2.5){powerups.splice(i,1);continue;}
    if(!p.noPickup&&Math.abs(swx-p.wx)<p.w*.6&&Math.abs(ship.y-p.y)<p.h*.6){
      activatePowerup(p.type);powerups.splice(i,1);
    }
  }
  // Tick active powerup duration (30s = 1800 frames)
  if(ship.pu){
    ship.pu.timer--;
    if(ship.pu.type===PU.LASER&&!laserHolding)laserDmgTimer=0;
    if(ship.pu.timer<=0){ship.pu=null;stopLaserSound();laserHolding=false;}
  }
  if(ship.puGlow>0)ship.puGlow--;
  if(ship.puText){ship.puText.timer--;ship.puText.y-=.55;if(ship.puText.timer<=0)ship.puText=null;}
  // Orb rotation
  orbAngle+=.12;
}
function activatePowerup(type){
  if(ship.pu?.type===PU.LASER)stopLaserSound();
  laserHolding=false;
  ship.pu={type,timer:1800};
  ship.puGlow=50;
  ship.puText={text:PU_NAME[type],y:ship.y-ship.h,timer:180,col:PU_COL[type]};
  playBlaster(); // little pickup ding
}
function drawPowerups(){
  for(const p of powerups){
    const sx=wts(p.wx);if(sx<-p.w||sx>W+p.w)continue;
    const col=PU_COL[p.type],t2=frame*.06;
    ctx.save();ctx.translate(sx,p.y);
    // Glowing crate box
    ctx.shadowBlur=20+Math.sin(t2)*8;ctx.shadowColor=col;
    ctx.strokeStyle=col;ctx.lineWidth=2;ctx.fillStyle=col+'18';
    ctx.strokeRect(-p.w/2,-p.h/2,p.w,p.h);ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);
    // Corner accents
    const cs=7;ctx.lineWidth=2.5;
    [[-1,-1],[1,-1],[1,1],[-1,1]].forEach(([cx2,cy2])=>{
      const bx=cx2*p.w/2,by=cy2*p.h/2;
      ctx.beginPath();ctx.moveTo(bx,by);ctx.lineTo(bx+cx2*-cs,by);ctx.stroke();
      ctx.beginPath();ctx.moveTo(bx,by);ctx.lineTo(bx,by+cy2*-cs);ctx.stroke();
    });
    // Letter
    ctx.fillStyle=col;ctx.shadowBlur=12;ctx.font=`bold ${Math.floor(p.h*.55)}px monospace`;
    ctx.textAlign='center';ctx.fillText(p.type,0,p.h*.2);
    ctx.restore();
  }
}
function drawPowerupHUD(){

function drawPowerupText(){

  const pt=ship.puText,fade=Math.min(1,pt.timer/30)*Math.min(1,pt.timer>150?1:(pt.timer/30));

// ─── Firing modes ─────────────────────────────────────────────────────
function fireBullet(autoVol){
  if(ship.pu?.type===PU.LASER)return; // laser handled separately
  if(frame-ship.lf<FIRE_CD)return;ship.lf=frame;
  const ox=shipWX()+ship.dir*ship.w*.52,oy=ship.y;
  if(ship.pu?.type===PU.TRI){
    const a=Math.PI/6;
    [[ship.dir*16,0],[ship.dir*14,Math.sin(-a)*8],[ship.dir*14,Math.sin(a)*8]].forEach(([vx,vy])=>{
      bullets.push({wx:ox,y:oy,vx,vy:vy||0,life:70});
    });
    playTriShot();
  } else {
    bullets.push({wx:ox,y:oy,vx:ship.dir*16,vy:0,life:70});
    if(ship.pu?.type===PU.SECOND){
      // Orb fires toward nearest enemy or straight ahead
      const orbX=ship.sx+Math.cos(orbAngle)*44,orbY=ship.y+Math.sin(orbAngle)*28;
      const orbWX=camX+orbX;
      bullets.push({wx:orbWX,y:orbY,vx:ship.dir*14,vy:0,life:65});
      playSecondShot();
    } else {
      playBlaster(autoVol||1);
    }
  }
  if(tutD){
    if(tutD.step===TUT.SHOOT){tutD.shots++;if(tutD.shots>=2)advTut();}
    if(tutD.step===TUT.POST_REV)tutD.postRevShots++;
  }
}
function updBullets(){for(let i=bullets.length-1;i>=0;i--){const b=bullets[i];b.wx+=b.vx;b.y+=(b.vy||0);if(--b.life<=0)bullets.splice(i,1);}}
function drawBullets(){
  ctx.save();ctx.shadowBlur=14;ctx.shadowColor='#ffff44';
  for(const b of bullets){const sx=wts(b.wx);if(sx<-30||sx>W+30)continue;ctx.fillStyle='#ffffa0';ctx.fillRect(sx-14,b.y-3,28,6);ctx.fillStyle='#fff';ctx.fillRect(sx-7,b.y-1.5,14,3);}
  ctx.restore();
}

function spawnBoss(){
  const cfg=ECFG[ET.BOSS],hp=12+(level-1)*6;
  // Spawn ahead of player at far edge of screen
  const targetScreenX=ship.dir===1?W*.82:W*.18;
  const wx=camX+targetScreenX;
  const tT=[0,45,90,135,180].map(o=>o+Math.floor(Math.random()*30));
  enemies.push({type:ET.BOSS,hp,maxHp:hp,wx,y:H/2,w:cfg.w,h:cfg.h,col:cfg.col,phase:0,flash:0,facing:-1,fireTimer:0,turretTimers:tT,
    bossTetherScreen:targetScreenX}); // fixed screen position (world scrolls under it)
}
// Boss fire rate scales with which boss battle this is (every 5 levels)
function getBossBattle(){return Math.floor(level/5);}
function getBossFireRate(baseRate){
  // Battle 1 (lv5)=full base, each battle ~20% faster, floor at 30%
  const battle=getBossBattle();return Math.round(baseRate*Math.max(.3,1-battle*.2));
}
function getFireRate(baseRate,lv){const m=lv===1?3.0:Math.max(.4,3.0-(lv-1)*.26);return Math.round(baseRate*m);}
function isOnScreen(e){const sx=wts(e.wx);return sx>-e.w&&sx<W+e.w;}
function enemyFire(e){
  if(!isOnScreen(e))return;
  const swx=shipWX(),cfg=ECFG[e.type];
  if(e.type===ET.BOSS){
    const rate=getBossFireRate(cfg.fireRate);
    const tPos=[-e.h*.38,-e.h*.2,0,e.h*.2,e.h*.38];
    tPos.forEach((ty,i)=>{
      e.turretTimers[i]++;
      if(e.turretTimers[i]>=rate){e.turretTimers[i]=0;const tx=e.wx+(e.facing===-1?e.w*.22:-e.w*.22),ty2=e.y+ty,dx=swx-tx,dy=ship.y-ty2,d=Math.hypot(dx,dy)+.001,spd=6+getBossBattle()*.8;enemyBullets.push({wx:tx,y:ty2,vx:dx/d*spd,vy:dy/d*spd,type:'laser',life:160,col:e.col});if(i===0)playEnemyShot(true);}
    });
  } else {
    const rate=getFireRate(cfg.fireRate,level);
    e.fireTimer++;if(e.fireTimer<rate)return;e.fireTimer=0;
    if(e.type===ET.FODDER){const spd=3.5;enemyBullets.push({wx:e.wx+e.facing*e.w*.5,y:e.y,vx:e.facing*spd,vy:0,type:'pellet',life:200,col:e.col});playEnemyShot(false);}
    else{const dx=swx-e.wx,dy=ship.y-e.y,d=Math.hypot(dx,dy)+.001,spd=e.type===ET.MID?5.5:7;enemyBullets.push({wx:e.wx+e.facing*e.w*.4,y:e.y,vx:dx/d*spd,vy:dy/d*spd,type:'laser',life:160,col:e.col});playEnemyShot(true);}
  }
}
function updEnemyBullets(){for(let i=enemyBullets.length-1;i>=0;i--){const b=enemyBullets[i];b.wx+=b.vx;b.y+=b.vy;if(--b.life<=0)enemyBullets.splice(i,1);}}
function drawEnemyBullets(){
  ctx.save();
  for(const b of enemyBullets){const sx=wts(b.wx);if(sx<-20||sx>W+20)continue;
    if(b.type==='laser'){ctx.shadowBlur=12;ctx.shadowColor=b.col;ctx.fillStyle=b.col;ctx.save();ctx.translate(sx,b.y);ctx.rotate(Math.atan2(b.vy,b.vx));ctx.fillRect(-14,-2,28,4);ctx.fillStyle='#fff';ctx.fillRect(-7,-1,14,2);ctx.restore();}
    else{ctx.shadowBlur=8;ctx.shadowColor=b.col;ctx.fillStyle=b.col;ctx.beginPath();ctx.arc(sx,b.y,4.5,0,Math.PI*2);ctx.fill();ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(sx,b.y,2,0,Math.PI*2);ctx.fill();}
  }
  ctx.shadowBlur=0;ctx.restore();
}
function updEnemies(){
  const swx=shipWX();
  for(const e of enemies){
    e.phase+=.03;if(e.flash>0)e.flash--;
    e.facing=swx<e.wx?-1:1;
    // Tethered tutorial enemy
    if(e.tutTether!==undefined){
      if(e.tutCurrentOffset>e.tutTether+2){e.tutCurrentOffset+=(e.tutTether-e.tutCurrentOffset)*.055;}
      else{e.tutCurrentOffset=e.tutTether;}
      e.wx=swx+ship.dir*e.tutCurrentOffset;
      e.y+=(H/2-e.y)*.04+Math.sin(e.phase)*.9;
      continue;
    }
    if(e.type===ET.BOSS){
      // Boss stays at fixed screen X (rides with camera), bobs vertically
      e.wx=camX+e.bossTetherScreen;
      // Vertical: tracks player Y with some lag + sine bob
      e.y+=(ship.y-e.y)*.025+Math.sin(e.phase)*1.4;
    } else {
      e.y+=Math.sin(e.phase)*.9;
      if(!isOnScreen(e)){const ed=Math.sign(e.wx-swx);if(ed!==0){const away=ed!==ship.dir;e.wx-=ed*(away?DRIFT_AWAY_SPD:DRIFT_TOWARD_SPD);}}
      e.wx=Math.max(WL+e.w/2,Math.min(WR-e.w/2,e.wx));
    }
    if(st===ST.PLAY||st===ST.BOSS)enemyFire(e);
  }
}

// MINIMAP
// ═══════════════════════════════════════════════════════════════════════
function drawMinimap(pulsing){
  if(pulsing){
    // Bright backdrop so map is unmissable
    const glow=.6+Math.sin(frame*.2)*.4;
    ctx.fillStyle=`rgba(0,20,60,${.95})`;ctx.fillRect(0,MM_Y,W,MM_H);
    // Multi-layer glow border
    ctx.shadowBlur=30*glow;ctx.shadowColor='#00eeff';
    ctx.strokeStyle=`rgba(0,240,255,${glow})`;ctx.lineWidth=3;ctx.strokeRect(1,MM_Y+1,W-2,MM_H-2);
    ctx.shadowBlur=15;ctx.shadowColor='#ffffff';
    ctx.strokeStyle=`rgba(255,255,255,${glow*.7})`;ctx.lineWidth=1.5;ctx.strokeRect(2,MM_Y+2,W-4,MM_H-4);
    ctx.shadowBlur=0;
  } else {
    ctx.fillStyle='rgba(0,6,20,.88)';ctx.fillRect(0,MM_Y,W,MM_H);
    ctx.strokeStyle='#002244';ctx.lineWidth=1;ctx.strokeRect(0,MM_Y,W,MM_H);
  }
  for(let y2=MM_Y+1;y2<MM_Y+MM_H;y2+=3){ctx.fillStyle=pulsing?'rgba(0,180,255,.06)':'rgba(0,150,255,.025)';ctx.fillRect(0,y2,W,1);}
  ctx.strokeStyle=pulsing?'rgba(0,120,200,.35)':'rgba(0,80,150,.2)';ctx.lineWidth=1;
  for(let i=1;i<8;i++){ctx.beginPath();ctx.moveTo(W*i/8,MM_Y);ctx.lineTo(W*i/8,MM_Y+MM_H);ctx.stroke();}
  ctx.strokeStyle='rgba(0,180,255,.4)';ctx.lineWidth=2;
  if(st!==ST.BOSS){
    ctx.beginPath();ctx.moveTo(2,MM_Y+2);ctx.lineTo(2,MM_Y+MM_H-2);ctx.stroke();
    ctx.beginPath();ctx.moveTo(W-2,MM_Y+2);ctx.lineTo(W-2,MM_Y+MM_H-2);ctx.stroke();
  }
  for(const e of enemies){
    const cy=MM_Y+MM_H/2;
    let bx;
    if(st===ST.BOSS){
      // Player-centered: show boss position relative to player, capped at edges
      const dx=e.wx-shipWX();
      const scale=W/(W*4); // boss is always within ~2 screens, show that range
      bx=Math.max(6,Math.min(W-6,W/2+dx*scale));
    } else {
      bx=Math.max(4,Math.min(W-4,wxToMap(e.wx)));
    }
    const isBoss=e.type===ET.BOSS,r=isBoss?5.5:e.type===ET.UPPER?3.5:e.type===ET.MID?3:2.5;
    const bc2=e.type===ET.FODDER?'#00ffee':e.type===ET.MID?'#ffaa00':e.type===ET.UPPER?'#ff44aa':'#cc44ff';
    const blipSize=pulsing?r*1.5:r;
    ctx.fillStyle=bc2;ctx.shadowBlur=pulsing?18:5;ctx.shadowColor=bc2;
    if(isBoss){ctx.beginPath();ctx.moveTo(bx,cy-blipSize*1.6);ctx.lineTo(bx+blipSize,cy);ctx.lineTo(bx,cy+blipSize*1.6);ctx.lineTo(bx-blipSize,cy);ctx.closePath();ctx.fill();}
    else{ctx.beginPath();ctx.arc(bx,cy,blipSize,0,Math.PI*2);ctx.fill();}
    ctx.shadowBlur=0;
  }
  // Player chevron — always center during boss, normal position otherwise
  const px=st===ST.BOSS?W/2:Math.max(6,Math.min(W-6,wxToMap(shipWX())));
  const cy=MM_Y+MM_H/2;
  ctx.fillStyle='#00e5ff';ctx.shadowBlur=pulsing?22:14;ctx.shadowColor='#00e5ff';
  ctx.beginPath();
  if(ship.dir===1){ctx.moveTo(px+7,cy);ctx.lineTo(px-5,cy-6);ctx.lineTo(px-5,cy+6);}
  else{ctx.moveTo(px-7,cy);ctx.lineTo(px+5,cy-6);ctx.lineTo(px+5,cy+6);}
  ctx.closePath();ctx.fill();ctx.shadowBlur=0;
  ctx.fillStyle=pulsing?'rgba(0,220,255,.8)':'rgba(0,100,180,.5)';ctx.font=pulsing?'bold 8px monospace':'7px monospace';ctx.textAlign='right';ctx.fillText('RADAR',W-4,MM_Y+MM_H-3);
}

// EDGE HINT
// ═══════════════════════════════════════════════════════════════════════
function drawEdgeHint(){
  if(st===ST.TUTORIAL||st===ST.BOSS)return;
  const wx=shipWX(),nearRight=ship.dir===1&&wx>WR-FLIP_HINT_DIST,nearLeft=ship.dir===-1&&wx<WL+FLIP_HINT_DIST;
  if(!nearRight&&!nearLeft)return;
  const t=nearRight?(WR-wx)/FLIP_HINT_DIST:(wx-WL)/FLIP_HINT_DIST;
  const alpha=(1-t)*(.55+Math.sin(frame*.22)*.45);
  ctx.save();ctx.globalAlpha=Math.max(0,Math.min(1,alpha));ctx.font=`bold ${Math.floor(H*.036)}px monospace`;ctx.shadowBlur=18;ctx.shadowColor='#ff8800';ctx.fillStyle='#ffcc44';
  const side=nearRight?1:-1;ctx.textAlign=side===1?'right':'left';const tx=side===1?W-18:18;
  ctx.fillText('SWIPE TO',tx,H/2-20);ctx.fillText('CHANGE',tx,H/2+8);ctx.fillText('DIRECTION',tx,H/2+36);ctx.restore();
}

// ═══════════════════════════════════════════════════════════════════════
// FLIP ANIM
// ═══════════════════════════════════════════════════════════════════════
function updFlipAnim(){
  if(!flipAnim)return;
  flipAnim.timer++;
  const t=flipAnim.timer/flipAnim.maxTimer;
  for(const p of flipAnim.px){
    p.x+=p.vx;p.y+=p.vy;p.vy*=.88;
  }
  if(flipAnim.phase==='stream'&&t>=1){
    // Reform: snap ship to target
    ship.sx=flipAnim.toX;ship.targetSx=flipAnim.toX;
    flipAnim.phase='reform';flipAnim.timer=0;flipAnim.maxTimer=8;
    // Converge all pixels toward new ship position for a quick flash
    for(const p of flipAnim.px){p.vx=(ship.sx-p.x)*.45;p.vy=(ship.y-p.y)*.45;}
  } else if(flipAnim.phase==='reform'&&t>=1){
    flipAnim=null;
  }
}
function drawFlipAnim(){
  if(!flipAnim)return;
  ctx.save();
  for(const p of flipAnim.px){
    // Pixels stretch in direction of motion for a streak effect
    const len=Math.abs(p.vx)*.55+p.sz;
    const alpha=flipAnim.phase==='reform'?Math.max(0,1-flipAnim.timer/flipAnim.maxTimer):1;
    ctx.shadowBlur=10;ctx.shadowColor=p.col;
    ctx.fillStyle=p.col+Math.floor(alpha*255).toString(16).padStart(2,'0');
    ctx.save();ctx.translate(p.x,p.y);ctx.rotate(Math.atan2(p.vy,p.vx));
    ctx.fillRect(-len/2,-p.sz/2,len,p.sz);ctx.restore();
  }
  // Brief bright flash at destination when reforming
  if(flipAnim.phase==='reform'){
    const flash=1-flipAnim.timer/flipAnim.maxTimer;
    ctx.globalAlpha=flash*.55;ctx.fillStyle='#00eeff';
    ctx.shadowBlur=30;ctx.shadowColor='#00eeff';
    ctx.beginPath();ctx.arc(ship.sx,ship.y,ship.w*.5,0,Math.PI*2);ctx.fill();
  }
  ctx.restore();
}


function triggerDeath(){
  ship.hp--;
  const px=[];
  for(let i=0;i<120;i++){const angle=Math.random()*Math.PI*2,spd=5+Math.random()*18;px.push({x:ship.sx+(Math.random()-.5)*ship.w*.9,y:ship.y+(Math.random()-.5)*ship.h*.9,vx:Math.cos(angle)*spd,vy:Math.sin(angle)*spd,sz:1.5+Math.random()*5.5,col:['#00e5ff','#ffffff','#0099aa','#00ffff','#004488'][Math.floor(Math.random()*5)],alpha:1});}
  deathAnim={pixels:px,phase:'explode',timer:55,livesLeft:ship.hp,snapX:[],snapY:[]};
  st=ST.DYING;screenFlash=45;ship.inv=9999;setThruster(0,55);isBoosting=false;
  ship.pu=null;ship.puGlow=0;ship.puText=null;stopLaserSound();laserHolding=false;
  playPlayerExplode();
}
function updDeathAnim(){
  if(!deathAnim)return;
  const da=deathAnim;da.timer--;
  if(da.phase==='explode'){
    for(const p of da.pixels){p.x+=p.vx;p.y+=p.vy;p.vx*=.91;p.vy*=.91;}
    if(da.timer<=0){
      da.snapX=da.pixels.map(p=>p.x);da.snapY=da.pixels.map(p=>p.y);
      da.snapVX=da.pixels.map(p=>p.vx); // save velocities before pause kills them
      da.snapVY=da.pixels.map(p=>p.vy);
      da.phase='pause';da.timer=35;
    }
  } else if(da.phase==='pause'){
    for(const p of da.pixels){p.x+=p.vx*.15;p.y+=p.vy*.15;}
    if(da.timer<=0){
      if(da.livesLeft>0){da.phase='reform';da.timer=62;playPlayerReform();}
      else{
        // Restore pre-pause velocities so pixels actually travel off screen
        for(let i=0;i<da.pixels.length;i++){da.pixels[i].vx=da.snapVX[i]*1.4;da.pixels[i].vy=da.snapVY[i]*1.4;}
        da.phase='gameoverFade';da.timer=600;saveHS(score);st=ST.DEAD;
      }
    }
  } else if(da.phase==='reform'){
    const t=easeOut(1-da.timer/62);
    for(let i=0;i<da.pixels.length;i++){da.pixels[i].x=da.snapX[i]+(ship.sx-da.snapX[i])*t;da.pixels[i].y=da.snapY[i]+(ship.y-da.snapY[i])*t;}
    if(da.timer<=0){deathAnim=null;ship.inv=200;st=ST.PLAY;}
  } else { // gameoverFade: keep spreading at full speed, no fade — visible through overlay
    for(const p of da.pixels){p.x+=p.vx*.55;p.y+=p.vy*.55;}
    if(--da.timer<=0)deathAnim=null;
  }
}
function drawDeathAnim(){
  if(!deathAnim)return;
  const da=deathAnim;
  for(const p of da.pixels){const a=p.alpha;if(a<=0)continue;ctx.save();ctx.shadowBlur=8;ctx.shadowColor=p.col;ctx.fillStyle=p.col+Math.floor(a*255).toString(16).padStart(2,'0');ctx.fillRect(p.x-p.sz/2,p.y-p.sz/2,p.sz,p.sz);ctx.restore();}
  if(da.livesLeft>0&&(da.phase==='pause'||da.phase==='reform')){
    const fi=da.phase==='pause'?Math.min(1,(35-da.timer)/10):1;
    ctx.save();ctx.globalAlpha=fi;ctx.textAlign='center';ctx.shadowBlur=22;ctx.shadowColor='#00ffcc';ctx.fillStyle='#00ffcc';
    ctx.font=`bold ${Math.floor(H*.055)}px monospace`;ctx.fillText(`LIVES LEFT: ${da.livesLeft}`,W/2,H*.44);ctx.restore();
  }
}

// ═══════════════════════════════════════════════════════════════════════
// COLLISIONS
// ═══════════════════════════════════════════════════════════════════════
function checkCollisions(){
  const swx=shipWX();
  for(let bi=bullets.length-1;bi>=0;bi--){
    const b=bullets[bi];
    for(let ei=enemies.length-1;ei>=0;ei--){
      const e=enemies[ei];
      if(Math.abs(b.wx-e.wx)<e.w/2+4&&Math.abs(b.y-e.y)<e.h/2+4){
        bullets.splice(bi,1);e.hp--;e.flash=10;
        if(e.hp<=0){
          explodeEnemy(e);enemies.splice(ei,1);score+=(e.type+1)*100*level;playExplosion(e.type>=ET.UPPER);
          if(st===ST.TUTORIAL&&tutD){
            tutD.enemy=null;
            if(tutD.step===TUT.SAUCER){energy=Math.min(MAX_EN,energy+ECFG[ET.FODDER].en);tutD.killedPause=210;}
            else if(tutD.step===TUT.FIGHTER){energy=Math.min(MAX_EN,energy+ECFG[ET.MID].en);tutD.killedPause=300;}
            else if(tutD.step===TUT.FRIGATE){energy=MAX_EN;advTut();} // fill bar completely
            else advTut();
          }
          else if(e.type===ET.BOSS){
            bossActive=false;screenFlash=55;
            enemies=[];enemyBullets=[];bullets=[];
            // Launch celebration particles — more, bigger, slower than normal
            const cfg2=ECFG[ET.BOSS];
            for(let pi=0;pi<160;pi++){
              const angle=Math.random()*Math.PI*2,spd=.8+Math.random()*3.5;
              particles.push({
                wx:e.wx+(Math.random()-.5)*e.w*1.4,y:e.y+(Math.random()-.5)*e.h*1.4,
                vwx:Math.cos(angle)*spd,vy:Math.sin(angle)*spd,
                sz:3+Math.random()*8,col:cfg2.col,
                maxLife:280+Math.floor(Math.random()*120),
                life:280+Math.floor(Math.random()*120),
                flyDelay:9999,en:0,flying:false,celebMode:true
              });
            }
            const bossScore=(ET.BOSS+1)*100*level;
            score+=bossScore;
            bossKill={timer:0,maxTimer:300,scoreStart:score-bossScore,scoreEnd:score,
                      displayScore:score-bossScore,nextChime:0,chimeN:0};
            st=ST.BOSS_DEAD;
          }
        }
        break;
      }
    }
  }
  if(ship.inv===0){
    for(let bi=enemyBullets.length-1;bi>=0;bi--){const b=enemyBullets[bi];if(Math.abs(b.wx-swx)<ship.w*.4&&Math.abs(b.y-ship.y)<ship.h*.4){enemyBullets.splice(bi,1);triggerDeath();break;}}
    if(ship.inv===0){for(const e of enemies){if(Math.abs(swx-e.wx)<(ship.w+e.w)*.36&&Math.abs(ship.y-e.y)<(ship.h+e.h)*.36){triggerDeath();break;}}}
  }
  if(ship.inv>0)ship.inv--;
}

// PARTICLES

// ═══════════════════════════════════════════════════════════════════════
// BOSS KILL CELEBRATION
// ═══════════════════════════════════════════════════════════════════════
function updBossKill(){
  if(!bossKill)return;
  bossKill.timer++;
  const t=bossKill.timer;
  // Score rings up over first 3 seconds (180 frames)
  const ringProgress=Math.min(1,t/180);
  bossKill.displayScore=Math.floor(bossKill.scoreStart+(bossKill.scoreEnd-bossKill.scoreStart)*ringProgress);
  // Play chimes at intervals that start fast and slow down
  if(t<=180&&t>=bossKill.nextChime){
    playScoreRing(bossKill.chimeN);
    bossKill.chimeN=Math.min(6,bossKill.chimeN+1);
    // Interval grows: starts at 10 frames, ends at 45
    const interval=10+Math.floor(bossKill.chimeN*5.5);
    bossKill.nextChime=t+interval;
  }
  if(t>=bossKill.maxTimer){bossKill=null;particles=[];beginHyperOut();}
}
function drawBossKill(){
  if(!bossKill)return;
  const t=bossKill.timer,fade=Math.min(1,t/15);
  ctx.save();ctx.globalAlpha=fade*.72;ctx.fillStyle='#000510';ctx.fillRect(0,0,W,H);ctx.restore();
  // Score display — glowing and pulsing
  const pulse=.85+Math.sin(t*.18)*.15;
  ctx.save();ctx.textAlign='center';
  // "BOSS ELIMINATED" header
  ctx.globalAlpha=fade;ctx.shadowBlur=30*pulse;ctx.shadowColor='#cc44ff';ctx.fillStyle='#dd88ff';
  ctx.font=`bold ${Math.floor(H*.048)}px monospace`;
  ctx.fillText('BOSS ELIMINATED',W/2,H*.32);
  // Score ringing up
  ctx.shadowBlur=40*pulse;ctx.shadowColor='#ffcc00';ctx.fillStyle='#ffee44';
  ctx.font=`bold ${Math.floor(H*.09)}px monospace`;
  ctx.fillText(String(bossKill.displayScore).padStart(8,'0'),W/2,H*.52);
  // Subtle "level X complete" sub-text
  ctx.shadowBlur=12;ctx.shadowColor='#00aaff';ctx.fillStyle='#88ccff';
  ctx.font=`${Math.floor(H*.028)}px monospace`;
  ctx.fillText(`LEVEL ${level} COMPLETE`,W/2,H*.65);
  ctx.restore();
}
function explodeEnemy(e){
  const cfg=ECFG[e.type],isBoss=e.type===ET.BOSS,n=isBoss?85:Math.round(cfg.en*3.8),enPer=isBoss?0:cfg.en/n;
  for(let i=0;i<n;i++){const ml=isBoss?55+Math.floor(Math.random()*30):38+Math.floor(Math.random()*18);particles.push({wx:e.wx+(Math.random()-.5)*e.w,y:e.y+(Math.random()-.5)*e.h,vwx:(Math.random()-.5)*8,vy:(Math.random()-.5)*8,sz:isBoss?4+Math.random()*5:2+Math.random()*3.5,col:cfg.col,maxLife:ml,life:ml,flyDelay:isBoss?9999:8+Math.floor(Math.random()*14),en:enPer,flying:false});}
}
function updParticles(){
  const swx=shipWX();
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];p.life--;
    if(p.celebMode){
      // Slow drift, slight deceleration — spreads wide and lingers
      p.wx+=p.vwx;p.y+=p.vy;p.vwx*=.98;p.vy*=.98;
      if(p.life<=0)particles.splice(i,1);
      continue;
    }
    if(!p.flying){p.wx+=p.vwx;p.y+=p.vy;p.vwx*=.9;p.vy*=.9;if(p.life<p.maxLife-p.flyDelay)p.flying=true;if(p.life<=0){particles.splice(i,1);continue;}}
    else{const dx=swx-p.wx,dy=ship.y-p.y,d=Math.hypot(dx,dy)+.01;const spd=Math.min(24,5+(1-Math.min(1,d/600))*20);p.wx+=dx/d*spd;p.y+=dy/d*spd;p.sz*=.96;if(d<22||p.sz<.4){energy=Math.min(MAX_EN,energy+p.en);particles.splice(i,1);}}
  }
}
function drawParticles(){
  for(const p of particles){const sx=wts(p.wx);if(sx<-20||sx>W+20)continue;const a=p.flying?.85:Math.min(1,p.life/(p.maxLife*.4));ctx.save();ctx.shadowBlur=10;ctx.shadowColor=p.col;ctx.fillStyle=p.col+Math.floor(a*255).toString(16).padStart(2,'0');ctx.fillRect(sx-p.sz/2,p.y-p.sz/2,p.sz,p.sz);ctx.restore();}
}

// ═══════════════════════════════════════════════════════════════════════
// HUD
// ═══════════════════════════════════════════════════════════════════════
function drawHUD(pulsing){
  if(st!==ST.TUTORIAL)drawMinimap(pulsing);
  const ey=enY(),ex=W*.06,ew=W*.88;
  if(st===ST.TUTORIAL){
    // Show energy bar only during ship-combat stages
    const showEnergy=tutD&&tutD.step>=TUT.SAUCER;
    drawMinimap(false);
    const ey=enY(),ex=W*.06,ew=W*.88;
    if(showEnergy){
      ctx.fillStyle='#001428';ctx.fillRect(ex,ey,ew,EN_H);ctx.strokeStyle='#003355';ctx.lineWidth=1;ctx.strokeRect(ex,ey,ew,EN_H);
      if(energy>0){
        const fw=ew*(energy/MAX_EN),g=ctx.createLinearGradient(ex,0,ex+fw,0);
        // Pulse glow if we just got energy
        const glowing=tutD&&tutD.killedPause>0;
        if(glowing){const p=.7+Math.sin(frame*.3)*.3;g.addColorStop(0,'#0088ff');g.addColorStop(.5,'#00ffff');g.addColorStop(1,'#aaffff');ctx.shadowBlur=24*p;ctx.shadowColor='#00ffff';}
        else{g.addColorStop(0,'#0033ee');g.addColorStop(.55,'#00bbff');g.addColorStop(1,'#aaffff');ctx.shadowBlur=16;ctx.shadowColor='#00aaff';}
        ctx.fillStyle=g;ctx.fillRect(ex,ey,fw,EN_H);ctx.shadowBlur=0;
      }
      ctx.fillStyle='rgba(70,170,255,.5)';ctx.font='7px monospace';ctx.textAlign='center';ctx.fillText('ENERGY',W/2,ey-3);
    }
    return;
  }
  ctx.fillStyle='#001428';ctx.fillRect(ex,ey,ew,EN_H);ctx.strokeStyle='#003355';ctx.lineWidth=1;ctx.strokeRect(ex,ey,ew,EN_H);
  if(energy>0){
    const fw=ew*(energy/MAX_EN),g=ctx.createLinearGradient(ex,0,ex+fw,0),full=energy>=MAX_EN;
    if(full){const pulse=.7+Math.sin(frame*.25)*.3;g.addColorStop(0,'#0088ff');g.addColorStop(.5,'#00ffff');g.addColorStop(1,'#ffffff');ctx.shadowBlur=28*pulse;ctx.shadowColor='#00ffff';}
    else{g.addColorStop(0,'#0033ee');g.addColorStop(.55,'#00bbff');g.addColorStop(1,'#aaffff');ctx.shadowBlur=16;ctx.shadowColor='#00aaff';}
    ctx.fillStyle=g;ctx.fillRect(ex,ey,fw,EN_H);ctx.shadowBlur=0;
  }
  for(let i=1;i<10;i++){ctx.strokeStyle='rgba(0,80,160,.3)';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(ex+ew*i/10,ey);ctx.lineTo(ex+ew*i/10,ey+EN_H);ctx.stroke();}
  ctx.fillStyle='rgba(70,170,255,.5)';ctx.font='7px monospace';ctx.textAlign='center';ctx.fillText('ENERGY',W/2,ey-3);
  ctx.fillStyle='#00ffcc';ctx.font='bold 13px monospace';ctx.textAlign='right';ctx.shadowBlur=8;ctx.shadowColor='#00ffaa';ctx.fillText(String(score).padStart(8,'0'),W-12,ey+EN_H+16);ctx.shadowBlur=0;
  ctx.fillStyle='#cc88ff';ctx.textAlign='left';ctx.font='bold 13px monospace';ctx.fillText('LV.'+level,12,ey+EN_H+16);
  if(isBoosting){ctx.fillStyle='#ff8800';ctx.shadowBlur=10;ctx.shadowColor='#ff8800';ctx.font=`bold ${Math.floor(H*.028)}px monospace`;ctx.textAlign='center';ctx.fillText('BOOST',W/2,ey+EN_H+16);ctx.shadowBlur=0;}
  drawPowerupHUD();
  for(let i=0;i<3;i++){ctx.font='17px sans-serif';ctx.textAlign='left';ctx.fillStyle=i<ship.hp?'#ff4466':'#2a0018';ctx.shadowBlur=i<ship.hp?12:0;ctx.shadowColor='#ff4466';ctx.fillText('♥',12+i*21,H-12);ctx.shadowBlur=0;}
}

// ═══════════════════════════════════════════════════════════════════════
// WORLD BOUNDS
// ═══════════════════════════════════════════════════════════════════════
function applyWorldBounds(){
  if(st===ST.BOSS)return; // boss level = infinite map, no edges
  const wx=shipWX();
  if(wx>=WR&&ship.dir===1)flipShip();else if(wx<=WL&&ship.dir===-1)flipShip();
  const cl=Math.max(WL,Math.min(WR,wx));if(cl!==wx)camX=cl-ship.sx;
}

// INPUT
// ═══════════════════════════════════════════════════════════════════════
const getTutBox=()=>({x:W/2-115,y:H*.815,w:230,h:32});
C.addEventListener('touchstart',e=>{
  e.preventDefault();
  for(const t of e.changedTouches){
    if(st===ST.TITLE){
      const box=getTutBox();
      if(t.clientX>=box.x&&t.clientX<=box.x+box.w&&t.clientY>=box.y&&t.clientY<=box.y+box.h){saveTutPref(!wantTutorial);return;}
      startPlay();return;
    }
    if(st===ST.DEAD){newGame(true);return;}
    if([ST.CLEAR,ST.DYING,ST.HYPERIN,ST.HYPEROUT,ST.BOSSTRANS,ST.LEVEL_INTRO].includes(st))return;
    const left=t.clientX<W/2,isMove=ship.dir===1?left:!left;
    if(isMove&&moveTouchId===null){moveTouchId=t.identifier;moveTouchY=t.clientY;moveTouchX=t.clientX;moveTouchStartX=t.clientX;}
    else if(!isMove&&fireTouchId===null){
      fireTouchId=t.identifier;ftSX=t.clientX;ftSY=t.clientY;
      if(ship.pu?.type===PU.LASER)laserHolding=true;
      else fireBullet();
    }
  }
},{passive:false});
C.addEventListener('touchmove',e=>{e.preventDefault();for(const t of e.changedTouches)if(t.identifier===moveTouchId){moveTouchY=t.clientY;moveTouchX=t.clientX;}},{passive:false});
C.addEventListener('touchend',e=>{
  e.preventDefault();
  for(const t of e.changedTouches){
    if(t.identifier===moveTouchId){moveTouchId=null;moveTouchY=null;moveTouchX=null;moveTouchStartX=null;isBoosting=false;}
    if(t.identifier===fireTouchId){
      if(Math.hypot(t.clientX-ftSX,t.clientY-ftSY)>36)flipShip();
      fireTouchId=null;laserHolding=false;
    }
  }
},{passive:false});
function flipShip(){
  if(st===ST.BOSS)return;
  if(flipAnim)return; // prevent double-flip mid-animation
  ship.dir*=-1;
  const targetX=ship.dir===1?W*.15:W*.85;
  // Generate glitch pixels from ship's current position
  const px=[];
  for(let i=0;i<55;i++){
    const angle=Math.random()*Math.PI*2;
    const spd=(Math.random()*.4+.6)*(W/(28+Math.random()*8)); // fast enough to cross screen in ~28-36 frames
    px.push({
      x:ship.sx+(Math.random()-.5)*ship.w*.95,
      y:ship.y+(Math.random()-.5)*ship.h*.95,
      vx:Math.cos(angle)*spd*Math.sign(targetX-ship.sx), // bias toward target side
      vy:Math.sin(angle)*spd*.18,
      sz:2+Math.random()*5,
      col:['#00e5ff','#ffffff','#0099aa','#00ffff','#88ffff'][Math.floor(Math.random()*5)],
      progress:0
    });
    // Correct the bias: vx should be predominantly toward targetX
    px[px.length-1].vx=((targetX-ship.sx)/W)*(spd*1.6+Math.random()*spd*.4)+(Math.random()-.5)*spd*.3;
  }
  flipAnim={px,fromX:ship.sx,toX:targetX,timer:0,maxTimer:30,phase:'stream'};
  ship.targetSx=targetX; // for any fallback
  isBoosting=false;playWhoosh();
  // Tutorial hooks
  if(tutD){
    if(tutD.step===TUT.REV1)advTut();
    else if(tutD.step===TUT.REV2)advTut();
  }
}
const K={};
document.addEventListener('keydown',e=>{
  K[e.code]=true;
  if(e.code==='Space'){if(st===ST.TITLE){startPlay();return;}if(st===ST.DEAD){newGame(true);return;}if([ST.DYING,ST.HYPERIN,ST.HYPEROUT,ST.BOSSTRANS,ST.LEVEL_INTRO].includes(st))return;
    if(ship.pu?.type===PU.LASER)laserHolding=true;else fireBullet();
  }
  if((e.code==='KeyF'||e.code==='ShiftLeft')&&![ST.TITLE,ST.DYING,ST.HYPERIN,ST.HYPEROUT,ST.BOSSTRANS,ST.LEVEL_INTRO].includes(st))flipShip();
});
document.addEventListener('keyup',e=>{K[e.code]=false;if(e.code==='Space')laserHolding=false;});
// Mouse click for title screen checkbox (desktop)
C.addEventListener('click',e=>{
  if(st===ST.TITLE){const box=getTutBox();if(e.clientX>=box.x&&e.clientX<=box.x+box.w&&e.clientY>=box.y&&e.clientY<=box.y+box.h)saveTutPref(!wantTutorial);}
});

// ═══════════════════════════════════════════════════════════════════════
// UPDATE
// ═══════════════════════════════════════════════════════════════════════
function update(){
  frame++;
  if(st===ST.HYPERIN||st===ST.HYPEROUT){updHyper();return;}
  if(st===ST.BOSSTRANS){updBossTrans();updEnemies();updEnemyBullets();updParticles();return;}
  if(st===ST.DYING||st===ST.DEAD){updDeathAnim();if(screenFlash>0)screenFlash--;return;}
  if(st===ST.LEVEL_INTRO){if(--levelIntroTimer<=0)st=ST.PLAY;return;}
  if(st===ST.BOSS_DEAD){updBossKill();updParticles();if(screenFlash>0)screenFlash--;return;}
  if(st!==ST.PLAY&&st!==ST.BOSS&&st!==ST.CLEAR&&st!==ST.TUTORIAL)return;

  ship.sx+=(ship.targetSx-ship.sx)*.11; // still needed for hyperspace landing; flip overrides via flipAnim
  if(flipAnim){updFlipAnim();}

  let boostNow=false;
  if(moveTouchId!==null&&moveTouchStartX!==null){const dx=ship.dir===1?(moveTouchX-moveTouchStartX):(moveTouchStartX-moveTouchX);if(dx>BOOST_THRESH)boostNow=true;}
  if(K.ShiftRight||K.KeyZ)boostNow=true;
  if(boostNow&&!isBoosting)startThruster();
  isBoosting=boostNow;scrollSpd=isBoosting?BOOST_SCROLL:BASE_SCROLL;setThruster(isBoosting?.85:.35,isBoosting?110:55);

  camX+=ship.dir*scrollSpd;
  if(st!==ST.TUTORIAL)applyWorldBounds();

  if(moveTouchY!==null)ship.y=Math.max(safeY(),Math.min(H-42,moveTouchY));
  if(K.ArrowUp||K.KeyW)ship.y=Math.max(safeY(),ship.y-5);
  if(K.ArrowDown||K.KeyS)ship.y=Math.min(H-42,ship.y+5);

  updBullets();updEnemyBullets();updEnemies();updParticles();updPowerups();
  // Autofire
  if(ship.pu?.type===PU.AUTO&&(st===ST.PLAY||st===ST.BOSS))fireBullet(.75);
  // Laser beam
  if(ship.pu?.type===PU.LASER&&laserHolding&&(st===ST.PLAY||st===ST.BOSS)){
    startLaserSound();
    laserDmgTimer++;
    if(laserDmgTimer===1||laserDmgTimer%15===0){// immediate first hit, then every ~0.25s
      const swx=shipWX();
      for(let ei=enemies.length-1;ei>=0;ei--){
        const e=enemies[ei];const sx=wts(e.wx);
        // Hit enemies within the laser beam (horizontal band ±25px)
        const beamInRange=ship.dir===1?(sx>ship.sx-10&&sx<ship.sx+W):(sx<ship.sx+10&&sx>ship.sx-W);
        if(beamInRange&&Math.abs(e.y-ship.y)<e.h*.6){
          e.hp--;e.flash=6;
          if(e.hp<=0){
            explodeEnemy(e);enemies.splice(ei,1);score+=(e.type+1)*100*level;playExplosion(e.type>=ET.UPPER);
            if(e.type===ET.BOSS){bossActive=false;enemies=[];enemyBullets=[];setTimeout(()=>{if(ship.pu?.type===PU.LASER){stopLaserSound();laserHolding=false;}setTimeout(()=>beginHyperOut(),900);},10);}
          }
        }
      }
    }
  } else if(ship.pu?.type!==PU.LASER){
    stopLaserSound();
  }
  if(st!==ST.TUTORIAL)checkCollisions();
  else{checkCollisions();updTutorial();}
  if(screenFlash>0)screenFlash--;

  if(st===ST.CLEAR){if(--clearTimer<=0)beginHyperOut();return;}
  if((st===ST.PLAY||st===ST.BOSS)&&!bossActive&&energy>=MAX_EN){
    if(level%5===0)triggerBossTrans();
    else{for(const e of enemies){explodeEnemy(e);playExplosion(false);}enemies=[];enemyBullets=[];beginHyperOut();}
  }
}

// ═══════════════════════════════════════════════════════════════════════
// DRAW
// ═══════════════════════════════════════════════════════════════════════
function drawBG(){
  ctx.fillStyle='#000710';ctx.fillRect(0,0,W,H);
  const ng=ctx.createRadialGradient(W*.65,H*.38,10,W*.65,H*.38,H*.6);
  ng.addColorStop(0,'rgba(16,0,44,.15)');ng.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=ng;ctx.fillRect(0,0,W,H);
}

function drawTitle(){
  drawBG();drawStars(.5);
  ctx.fillStyle='rgba(0,4,18,.82)';ctx.fillRect(0,0,W,H);
  ctx.save();ctx.textAlign='center';

  // GLITCH PILOT title - Orbitron font
  const titleY=H*.32;
  ctx.shadowBlur=50;ctx.shadowColor='#00ccff';ctx.fillStyle='#00eeff';
  ctx.font=`900 ${Math.floor(H*.11)}px Orbitron, monospace`;
  ctx.fillText('GLITCH PILOT',W/2,titleY);
  // 2095 line
  ctx.shadowBlur=40;ctx.shadowColor='#cc44ff';ctx.fillStyle='#cc44ff';
  ctx.font=`900 ${Math.floor(H*.08)}px Orbitron, monospace`;
  ctx.fillText('2095',W/2,titleY+Math.floor(H*.095));
  // Tagline
  ctx.shadowBlur=0;ctx.fillStyle='rgba(160,100,255,.5)';
  ctx.font=`${Math.floor(H*.022)}px monospace`;ctx.fillText('ABSORB · CHARGE · BREACH',W/2,H*.58);

  // High score
  if(highScore>0){
    ctx.shadowBlur=10;ctx.shadowColor='#ffaa00';ctx.fillStyle='#ffcc44';
    ctx.font=`bold ${Math.floor(H*.028)}px monospace`;
    ctx.fillText(`BEST: ${String(highScore).padStart(8,'0')}`,W/2,H*.63);
  }

  // TAP TO LAUNCH
  const p=.6+Math.sin(frame*.08)*.4;ctx.globalAlpha=p;ctx.shadowBlur=18;ctx.shadowColor='#ff88ff';
  ctx.fillStyle='rgba(255,200,255,.88)';ctx.font=`${Math.floor(H*.042)}px monospace`;ctx.fillText('TAP TO LAUNCH',W/2,H*.7);
  ctx.globalAlpha=1;

  // Tutorial checkbox
  const box=getTutBox(),cbx=box.x,cby=box.y+4,cbw=22,cbh=22;
  ctx.shadowBlur=0;ctx.strokeStyle='#88aacc';ctx.lineWidth=1.5;ctx.strokeRect(cbx,cby,cbw,cbh);
  if(wantTutorial){ctx.strokeStyle='#00ffcc';ctx.lineWidth=2;ctx.shadowBlur=8;ctx.shadowColor='#00ffcc';ctx.beginPath();ctx.moveTo(cbx+3,cby+11);ctx.lineTo(cbx+9,cby+18);ctx.lineTo(cbx+19,cby+4);ctx.stroke();ctx.shadowBlur=0;}
  ctx.fillStyle='rgba(136,170,204,.85)';ctx.font=`${Math.floor(H*.024)}px monospace`;ctx.textAlign='left';
  ctx.fillText('Launch with Tutorial',cbx+cbw+8,cby+16);

  // Controls hint
  ctx.globalAlpha=.45;ctx.shadowBlur=0;ctx.fillStyle='#88aacc';ctx.font=`${Math.floor(H*.018)}px monospace`;ctx.textAlign='center';
  ctx.fillText('DRAG to move  ·  TAP to fire  ·  SWIPE to flip direction',W/2,H*.9);
  ctx.restore();
}

function draw(){
  if(st===ST.TITLE){drawTitle();return;}

  drawBG();

  if(st===ST.HYPERIN){drawStars(8);drawHyperBeams(ship.sx,ship.y);drawShip();drawHUD();return;}
  if(st===ST.HYPEROUT){
    drawStars(12);const t=hyperAnim?hyperAnim.timer/hyperAnim.maxTimer:1;
    if(t<.3){ctx.fillStyle=`rgba(255,255,255,${(1-t/.3)*.7})`;ctx.fillRect(0,0,W,H);}
    drawHyperBeams(ship.sx,ship.y);drawShip();drawHUD();return;
  }

  // Boss kill celebration
  if(st===ST.BOSS_DEAD){
    drawStars(1);drawParticles();drawShip();drawHUD();
    if(screenFlash>0){ctx.fillStyle=`rgba(255,255,255,${screenFlash/80})`;ctx.fillRect(0,0,W,H);}
    drawBossKill();
    return;
  }

  // Tutorial state
  if(st===ST.TUTORIAL){
    drawStars(isBoosting?2.5:1);drawParticles();enemies.forEach(e=>drawEnemy(e));drawEnemyBullets();drawBullets();drawPowerups();drawShip();drawTutorial();drawHUD();
    if(screenFlash>0){ctx.fillStyle=`rgba(255,255,255,${screenFlash/80})`;ctx.fillRect(0,0,W,H);}
    return;
  }

  // Level 1 intro
  if(st===ST.LEVEL_INTRO){
    drawStars(1);enemies.forEach(e=>drawEnemy(e));drawHUD(false); // draw map normally first
    // Dim everything EXCEPT the top map strip
    const t=levelIntroTimer;
    const fadeIn=Math.min(1,(300-t)/20);
    ctx.save();
    ctx.globalAlpha=fadeIn*.8;ctx.fillStyle='#000714';
    // Dim below the minimap only
    ctx.fillRect(0,MM_Y+MM_H,W,H-(MM_Y+MM_H));
    ctx.restore();
    // Redraw the minimap bright on top of the dim
    drawMinimap(true);
    // Text + drawn arrow
    ctx.save();ctx.globalAlpha=fadeIn;ctx.textAlign='center';
    const textY=H*.44;
    ctx.shadowBlur=24;ctx.shadowColor='#00aaff';ctx.fillStyle='#00eeff';
    ctx.font=`bold ${Math.floor(H*.038)}px monospace`;
    ctx.fillText('MAP SHOWS CURRENT ENEMY LOCATIONS',W/2,textY);
    // Drawn curved arrow from text up to minimap
    const arrowStartY=textY-18,arrowEndY=MM_Y+MM_H+10,midY=(arrowStartY+arrowEndY)/2-20;
    ctx.strokeStyle='#00eeff';ctx.lineWidth=2.5;ctx.shadowBlur=12;ctx.shadowColor='#00aaff';
    ctx.beginPath();ctx.moveTo(W/2,arrowStartY);ctx.bezierCurveTo(W/2,midY,W/2,midY,W/2,arrowEndY);ctx.stroke();
    // Arrowhead pointing up
    ctx.fillStyle='#00eeff';ctx.shadowBlur=10;
    ctx.beginPath();ctx.moveTo(W/2,arrowEndY-12);ctx.lineTo(W/2-8,arrowEndY);ctx.lineTo(W/2+8,arrowEndY);ctx.closePath();ctx.fill();
    // Countdown
    if(t<180){
      const cnt=t<60?1:t<120?2:3;
      ctx.fillStyle='#cc88ff';ctx.shadowColor='#cc44ff';ctx.shadowBlur=18;
      ctx.font=`bold ${Math.floor(H*.038)}px monospace`;
      ctx.fillText(`READY TO PLAY IN  ${cnt}`,W/2,H*.6);
    }
    ctx.restore();
    return;
  }

  drawStars(isBoosting?2.5:1);drawParticles();

  const bta=getBossTransAlpha(),btg=getBossTransGlow();
  if(btg>0){
    ctx.save();ctx.globalAlpha=btg*.28;ctx.fillStyle='#8800ff';ctx.fillRect(0,0,W,H);
    ctx.globalAlpha=btg*.06;for(let y2=0;y2<H;y2+=4){ctx.fillStyle='#000';ctx.fillRect(0,y2,W,2);}ctx.restore();
    if(bossTrans&&bossTrans.timer>20){ctx.save();ctx.textAlign='center';ctx.globalAlpha=Math.min(1,(bossTrans.timer-20)/30)*(.7+Math.sin(frame*.3)*.3);ctx.shadowBlur=30;ctx.shadowColor='#cc44ff';ctx.fillStyle='#dd88ff';ctx.font=`bold ${Math.floor(H*.055)}px monospace`;ctx.fillText('⚠  BOSS BATTLE  ⚠',W/2,H*.46);ctx.restore();}
  }

  enemies.forEach(e=>drawEnemy(e,e.type===ET.BOSS?1:bta));
  drawEnemyBullets();drawBullets();drawPowerups();
  // Laser beam
  if(ship.pu?.type===PU.LASER&&laserHolding&&st!==ST.DYING&&st!==ST.DEAD){
    const col='#ffff44',beamX=ship.sx+(ship.dir===1?ship.w*.5:-ship.w*.5);
    const beamW=ship.dir===1?(W-beamX+20):(beamX+20);
    const beamDir=ship.dir===1?1:-1;
    ctx.save();
    ctx.shadowBlur=28+Math.sin(frame*.3)*8;ctx.shadowColor=col;
    ctx.fillStyle=col+'cc';ctx.fillRect(ship.dir===1?beamX:-20,ship.y-3,beamW,6);
    ctx.fillStyle='#ffffff';ctx.fillRect(ship.dir===1?beamX:-20,ship.y-1.5,beamW,3);
    // Flicker bands
    ctx.globalAlpha=.35+Math.random()*.25;ctx.fillStyle=col;
    for(let bx=0;bx<beamW;bx+=22+Math.floor(Math.random()*18)){
      ctx.fillRect((ship.dir===1?beamX:(-20))+bx,ship.y-5,6+Math.random()*10,10);
    }
    ctx.restore();
  }
  // Second shot orb
  if(ship.pu?.type===PU.SECOND&&st!==ST.DYING&&st!==ST.DEAD){
    const ox=ship.sx+Math.cos(orbAngle)*44,oy=ship.y+Math.sin(orbAngle)*28;
    const col='#ff44ff';
    ctx.save();ctx.shadowBlur=18;ctx.shadowColor=col;ctx.fillStyle=col;
    ctx.beginPath();ctx.arc(ox,oy,7,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#fff';ctx.shadowBlur=0;ctx.beginPath();ctx.arc(ox,oy,3,0,Math.PI*2);ctx.fill();
    // Orbit trail
    ctx.strokeStyle=col+'44';ctx.lineWidth=1;ctx.shadowBlur=6;ctx.shadowColor=col;
    ctx.beginPath();ctx.ellipse(ship.sx,ship.y,44,28,0,0,Math.PI*2);ctx.stroke();
    ctx.restore();
  }
  drawShipPowerupGlow();
  const hidingForFlip=flipAnim&&flipAnim.phase==='stream';
  if(st!==ST.DYING&&st!==ST.DEAD&&!hidingForFlip)drawShip();
  drawFlipAnim();
  drawPowerupText();
  drawEdgeHint();
  drawHUD();

  if(screenFlash>0){ctx.fillStyle=`rgba(255,255,255,${screenFlash/80})`;ctx.fillRect(0,0,W,H);}
  if((st===ST.BOSS||st===ST.DYING)&&bossActive&&!bossTrans){ctx.save();ctx.globalAlpha=.09;ctx.fillStyle='#aa00ff';ctx.fillRect(0,0,W,H);ctx.restore();ctx.save();ctx.globalAlpha=.04;for(let y2=0;y2<H;y2+=4){ctx.fillStyle='#000';ctx.fillRect(0,y2,W,2);}ctx.restore();}

  // DEAD overlay first, then pixels spread on top
  if(st===ST.DEAD){
    ctx.fillStyle='rgba(0,0,0,.78)';ctx.fillRect(0,0,W,H);
    ctx.save();ctx.textAlign='center';ctx.shadowBlur=35;ctx.shadowColor='#ff0044';
    ctx.fillStyle='#ff3366';ctx.font=`bold ${Math.floor(H*.11)}px monospace`;ctx.fillText('GAME',W/2,H*.33);ctx.fillText('OVER',W/2,H*.48);
    ctx.fillStyle='#88ffff';ctx.shadowColor='#00ffff';ctx.shadowBlur=15;ctx.font=`${Math.floor(H*.04)}px monospace`;ctx.fillText(`SCORE: ${score}`,W/2,H*.63);
    if(highScore>0&&score>=highScore&&score>0){ctx.fillStyle='#ffcc44';ctx.shadowColor='#ffaa00';ctx.shadowBlur=18;ctx.font=`bold ${Math.floor(H*.03)}px monospace`;ctx.fillText('NEW HIGH SCORE!',W/2,H*.71);}
    const p=.6+Math.sin(frame*.09)*.4;ctx.globalAlpha=p;ctx.fillStyle='#cc88ff';ctx.shadowColor='#cc88ff';
    ctx.font=`${Math.floor(H*.034)}px monospace`;ctx.fillText('TAP TO RETURN TO MENU',W/2,H*.8);ctx.restore();
  }
  // Pixels always drawn last so they appear over everything including game over screen
  drawDeathAnim();
}

// ═══════════════════════════════════════════════════════════════════════
// LAUNCH
// ═══════════════════════════════════════════════════════════════════════
document.fonts.ready.then(()=>{
  newGame(false);
  (function loop(){update();draw();requestAnimationFrame(loop);})();
});
</script>
